<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页 | 欢迎</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        /* 毛玻璃效果类 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* 渐变背景动画 */
        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="glass max-w-2xl w-full rounded-[2.5rem] shadow-2xl overflow-hidden transform transition-all hover:scale-[1.01] duration-500">
        
        <div class="p-10 text-center border-b border-white/20">
            <div class="w-24 h-24 bg-gradient-to-tr from-pink-500 to-yellow-400 rounded-full mx-auto mb-6 shadow-xl flex items-center justify-center text-white text-4xl font-bold ring-4 ring-white/50">
                G
            </div>
            <h1 class="text-3xl md:text-4xl font-600 text-gray-800 tracking-tight">你的名字</h1>
            <p class="text-gray-600 mt-3 text-lg">🚀 终身学习者 · 游戏爱好者 · 科技探索者</p>
        </div>

        <div class="p-10">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>
                关于我
            </h2>
            <p class="text-gray-600 leading-relaxed text-lg mb-8">
                你好！我是Finch。欢迎来到我的 GitHub Pages。我热衷于探索前沿技术，目前正在上高一。
            </p>

            <div class="flex flex-wrap gap-3 mb-10">
                <span class="px-4 py-1.5 bg-indigo-100/50 text-indigo-600 rounded-xl text-sm font-semibold">HTML5</span>
                <span class="px-4 py-1.5 bg-pink-100/50 text-pink-600 rounded-xl text-sm font-semibold">Tailwind CSS</span>
                <span class="px-4 py-1.5 bg-blue-100/50 text-blue-600 rounded-xl text-sm font-semibold">JavaScript</span>
                <span class="px-4 py-1.5 bg-emerald-100/50 text-emerald-600 rounded-xl text-sm font-semibold">GitHub Pages</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a href="https://github.com/finch0714" target="_blank" class="flex items-center justify-center px-8 py-4 bg-gray-900 text-white rounded-2xl hover:bg-gray-800 transition-all shadow-lg active:scale-95 font-medium">
                    访问 GitHub
                </a>
                <a href="mailto:finch0714@qq.com" class="flex items-center justify-center px-8 py-4 bg-white/50 text-gray-800 border border-gray-200 rounded-2xl hover:bg-white/80 transition-all shadow-sm active:scale-95 font-medium">
                    发送邮件
                </a>
            </div>
        </div>

        <div class="bg-white/20 py-6 text-center text-sm text-gray-500 italic">
            © 2026 由 GitHub 和 ♥ 强力驱动 · 保持热爱
        </div>
    </div>

    <script>
        // 记录原始标题
        const originalTitle = document.title;

        // 监听标签页状态
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // 当用户离开时显示
                document.title = 'Σ(っ °Д °;)っ 别走嘛~';
            } else {
                // 当用户回来时显示，并在2秒后恢复原样
                document.title = 'ヾ(≧▽≦*)o 欢迎回来！';
                setTimeout(() => {
                    document.title = originalTitle;
                }, 2000);
            }
        });
    </script>

</body>
</html>
