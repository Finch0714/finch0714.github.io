<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 | 欢迎访问</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 弹窗动画 */
        .modal-enter { opacity: 0; transform: scale(0.9) translateY(20px); }
        .modal-enter-active { opacity: 1; transform: scale(1) translateY(0); transition: all 0.3s ease-out; }
        
        /* 隐藏滚动条 */
        .no-scroll { overflow: hidden; }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-xl w-full rounded-[2.5rem] shadow-2xl overflow-hidden transform transition-all hover:scale-[1.01] duration-500">
        <div class="p-10 text-center border-b border-white/20">
            <div class="w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-400 rounded-full mx-auto mb-6 shadow-xl flex items-center justify-center text-white text-3xl font-bold">
                G
            </div>
            <h1 class="text-3xl font-600 text-gray-800">你的名字</h1>
            <p class="text-gray-500 mt-2">✨ 正在构建精彩的世界</p>
        </div>

        <div class="p-10 text-center">
            <p class="text-gray-600 leading-relaxed mb-8">
                欢迎来到我的数字空间！这里是我分享创意和技术的地方。点击下方按钮与我取得联系。
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="https://github.com/你的用户名" target="_blank" class="px-8 py-3 bg-gray-900 text-white rounded-2xl hover:bg-gray-800 transition-all font-medium">
                    GitHub
                </a>
                <button onclick="openModal()" class="px-8 py-3 bg-white/60 text-gray-800 border border-white rounded-2xl hover:bg-white/90 transition-all font-medium shadow-sm">
                    联系我
                </button>
            </div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div onclick="closeModal()" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        
        <div id="modalContent" class="glass w-full max-w-md rounded-[2rem] shadow-2xl relative z-10 p-8 transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">联系方式</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div class="flex items-center p-4 bg-white/40 rounded-2xl">
                    <span class="text-2xl mr-4">📧</span>
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-bold">Email</p>
                        <p class="text-gray-700">your-email@example.com</p>
                    </div>
                </div>
                <div class="flex items-center p-4 bg-white/40 rounded-2xl">
                    <span class="text-2xl mr-4">💬</span>
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-bold">WeChat / QQ</p>
                        <p class="text-gray-700">YourID_12345</p>
                    </div>
                </div>
                <div class="flex items-center p-4 bg-white/40 rounded-2xl">
                    <span class="text-2xl mr-4">📍</span>
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-bold">Location</p>
                        <p class="text-gray-700">中国 · 上海</p>
                    </div>
                </div>
            </div>

            <button onclick="closeModal()" class="w-full mt-8 py-3 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 transition-colors font-semibold">
                知道了
            </button>
        </div>
    </div>

    <script>
        // 1. 弹窗逻辑
        const modal = document.getElementById('contactModal');
        const content = document.getElementById('modalContent');

        function openModal() {
            modal.classList.remove('hidden');
            document.body.classList.add('no-scroll');
            // 添加动画类
            content.classList.add('modal-enter-active');
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('no-scroll');
            content.classList.remove('modal-enter-active');
        }

        // 2. 挽留标题逻辑
        const originalTitle = document.title;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.title = 'Σ(っ °Д °;)っ 别走嘛~';
            } else {
                document.title = 'ヾ(≧▽≦*)o 欢迎回来！';
                setTimeout(() => { document.title = originalTitle; }, 2000);
            }
        });
    </script>

</body>
</html>
