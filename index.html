<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 | 欢迎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="glass max-w-2xl w-full rounded-3xl shadow-2xl overflow-hidden transform transition-all hover:scale-[1.01] duration-300">
        
        <div class="p-8 text-center border-b border-white/20">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-400 to-purple-500 rounded-full mx-auto mb-4 shadow-lg flex items-center justify-center text-white text-3xl font-bold">
                G
            </div>
            <h1 class="text-3xl font-600 text-gray-800">你的名字</h1>
            <p class="text-gray-600 mt-2">开发者 · 设计师 · 终身学习者</p>
        </div>

        <div class="p-8">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">关于我</h2>
            <p class="text-gray-600 leading-relaxed mb-6">
                你好！欢迎来到我的 GitHub Pages。我热衷于用技术解决问题，目前专注于构建简洁、高效且美观的 Web 应用。
            </p>

            <div class="flex flex-wrap gap-2 mb-8">
                <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm font-medium">HTML/CSS</span>
                <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm font-medium">JavaScript</span>
                <span class="px-3 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm font-medium">Git</span>
                <span class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-sm font-medium">Python</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="https://github.com/你的用户名" class="flex items-center justify-center px-6 py-3 bg-gray-800 text-white rounded-xl hover:bg-gray-700 transition-colors shadow-md">
                    GitHub
                </a>
                <a href="mailto:your-email@example.com" class="flex items-center justify-center px-6 py-3 bg-white text-gray-800 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors shadow-sm">
                    联系我
                </a>
            </div>
        </div>

        <div class="bg-white/30 p-4 text-center text-xs text-gray-500">
            © 2026 由 GitHub Pages 强力驱动
        </div>
    </div>

</body>
</html>
