<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | 欢迎</title>
    
    <link rel="icon" type="image/png" href="Favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* 毛玻璃质感 */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 动态渐变背景 */
        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
        .no-scroll { overflow: hidden; }
    </style>
</head>

<body class="gradient-bg min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glass max-w-xl w-full rounded-[2.5rem] shadow-2xl overflow-hidden transform transition-all hover:scale-[1.005] duration-500">
        
        <div class="p-10 text-center border-b border-white/20">
            <div class="w-20 h-20 rounded-full mx-auto mb-6 shadow-xl overflow-hidden border-4 border-white/50 bg-gray-200">
                <img src="avatar.jpg" alt="头像" class="w-full h-full object-cover">
            </div>
            <h1 class="text-3xl font-600 text-gray-800">Finch0714</h1>
            <p class="text-gray-500 mt-2 italic text-sm">“专注、创造、永不止步”</p>
        </div>

        <div class="p-10">
            <p class="text-gray-600 leading-relaxed text-center mb-10">
                你好！欢迎来到我的主页。我是一个热衷于终身学习和影视、游戏的探索者。
                这里记录了我的技术足迹与创意构思。
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="https://space.bilibili.com/2066563707" target="_blank" class="px-8 py-3 bg-[#fb7299] text-white rounded-2xl hover:bg-[#e06489] transition-all font-medium text-center shadow-sm">
                    Bilibili
                </a>
                <button onclick="openModal()" class="px-8 py-3 bg-white/60 text-gray-800 border border-white rounded-2xl hover:bg-white/90 transition-all font-medium shadow-sm">
                    获取联系
                </button>
            </div>
        </div>

        <div class="bg-white/20 py-6 text-center">
            <p class="text-xs text-gray-400 uppercase tracking-widest">© 2026 Powered by GitHub Pages</p>
            <a href="index.html" class="inline-block mt-3 text-[10px] text-gray-500 hover:text-red-500 transition-colors duration-300">
                [ TERMINAL_LOGOUT // GO BACK ]
            </a>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div onclick="closeModal()" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div id="modalContent" class="glass w-full max-w-md rounded-[2.5rem] shadow-2xl relative z-10 p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800 tracking-tight">联系方式</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div class="flex items-center p-4 bg-white/40 rounded-2xl">
                    <span class="text-2xl mr-4">📧</span>
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Email</p>
                        <p class="text-gray-700 font-medium">your-email@example.com</p>
                    </div>
                </div>
                <div class="flex items-center p-4 bg-white/40 rounded-2xl">
                    <span class="text-2xl mr-4">💬</span>
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">QQ</p>
                        <p class="text-gray-700 font-medium">861288676</p>
                    </div>
                </div>
            </div>

            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-indigo-500 text-white rounded-2xl hover:bg-indigo-600 transition-colors font-bold shadow-lg">
                确认
            </button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('contactModal');
        function openModal() {
            modal.classList.remove('hidden');
            document.body.classList.add('no-scroll');
        }
        function closeModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('no-scroll');
        }

        const originalTitle = document.title;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.title = 'Σ(っ °Д °;)っ 别走嘛~';
            } else {
                document.title = 'ヾ(≧▽≦*)o 欢迎回来！';
                setTimeout(() => {
                    document.title = originalTitle;
                }, 2000);
            }
        });
    </script>
</body>
</html>
